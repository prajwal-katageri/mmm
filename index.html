<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Grabber — Capture</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <h1>📷 Photo Grabber</h1>
    <nav>
      <a href="/" class="active">Capture</a>
      <a href="/gallery.html">Gallery</a>
      <span id="userBadge" class="user-badge"></span>
    </nav>
  </header>

  <main class="capture-page">
    <!-- Stats -->
    <section class="stats">
      <div class="stat-item">
        <div class="stat-number" id="totalPhotos">0</div>
        <div class="stat-label">Total Photos</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="todayPhotos">0</div>
        <div class="stat-label">Today's Captures</div>
      </div>
    </section>

    <!-- Step 1 & 2: Camera access -->
    <section class="camera-section">
      <video id="videoFeed" autoplay playsinline></video>
      <canvas id="snapshotCanvas" style="display:none;"></canvas>
    </section>

    <!-- Step 3: Capture controls -->
    <section class="controls">
      <button id="btnStart" class="btn btn-primary">🎥 Start Camera</button>
      <button id="btnCapture" class="btn btn-success" disabled>📸 Capture Photo</button>
      <button id="btnRetake" class="btn btn-warning" style="display:none;">🔄 Retake</button>
      <button id="btnUpload" class="btn btn-upload" style="display:none;">⬆️ Upload</button>
    </section>

    <!-- Preview -->
    <section class="preview-section" style="display:none;">
      <h3>Preview</h3>
      <img id="previewImg" alt="Captured preview" />
    </section>

    <!-- Loading spinner -->
    <div class="spinner" id="spinner"></div>

    <!-- Status messages -->
    <div id="status" class="status-msg"></div>

    <!-- File upload alternative -->
    <section class="file-upload-section">
      <p>— or upload from device —</p>
      <input type="file" id="fileInput" accept="image/*" capture="environment" />
    </section>
  </main>

  <script src="/js/app.js"></script>
  <script>
    async function logout() {
      try {
        const token = localStorage.getItem("sessionToken");
        if (token) {
          await fetch("/api/auth/logout", {
            method: "POST",
            headers: { "x-session-token": token },
          });
        }
      } catch { /* ignore */ }
      localStorage.removeItem("sessionToken");
      localStorage.removeItem("username");
      location.href = "/login.html";
    }

    // Show logged-in user badge
    const u = localStorage.getItem("username");
    if (u) {
      document.getElementById("userBadge").innerHTML =
        `👤 ${u} <button class="logout-btn" onclick="logout()">Logout</button>`;
    }
  </script>
</body>
</html>
